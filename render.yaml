services:
  - type: web
    name: pr-coach
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ENV
        value: production
      - key: APP_ID
        sync: false
      - key: PRIVATE_KEY
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: PORT
        value: "8000"
    healthCheckPath: /health
